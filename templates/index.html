<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football Club Kit Search</title>
    <style>
      :root {
        --bg: #eef3ea;
        --panel: #fffdf8;
        --ink: #122020;
        --muted: #546060;
        --accent: #1f7a53;
        --accent-dark: #125239;
        --line: #d5dfd1;
        --error-bg: #fff1ef;
        --error-text: #9f2f1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(31, 122, 83, 0.18), transparent 28%),
          linear-gradient(145deg, #f7fbf5 0%, var(--bg) 55%, #dde9dd 100%);
      }

      .shell {
        width: min(920px, calc(100% - 32px));
        margin: 48px auto;
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid rgba(213, 223, 209, 0.9);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(18, 32, 32, 0.08);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 4vw, 3.8rem);
        line-height: 0.98;
      }

      .intro {
        margin: 14px 0 28px;
        max-width: 640px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        margin-bottom: 26px;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 16px 20px;
        font-size: 1rem;
        background: white;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 16px 22px;
        font-size: 1rem;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        cursor: pointer;
      }

      .card,
      .message {
        border-radius: 24px;
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 22px;
      }

      .message.error {
        background: var(--error-bg);
        color: var(--error-text);
        border-color: #f3c7bf;
      }

      .eyebrow {
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.72rem;
        color: var(--muted);
      }

      h2 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.7rem);
      }

      .source {
        display: inline-block;
        margin-top: 10px;
        color: var(--accent-dark);
        text-decoration: none;
      }

      .image-wrap {
        margin-top: 20px;
        padding: 32px;
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(31, 122, 83, 0.08), rgba(31, 122, 83, 0.02)),
          white;
        display: grid;
        place-items: center;
        min-height: 560px;
      }

      img {
        width: auto;
        max-width: min(100%, 520px);
        max-height: 680px;
        object-fit: contain;
        display: block;
      }

      .footnote {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 720px) {
        .shell {
          margin: 20px auto;
          padding: 20px;
          border-radius: 20px;
        }

        form {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }

        .image-wrap {
          min-height: 420px;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>Search a football club and see its kit</h1>
      <p class="intro">
        Type a club name, and this Python site searches zerozero.pt, opens the first matching team page,
        and shows the equipment image used there.
      </p>

      <form method="GET" action="/">
        <input
          type="text"
          name="club"
          placeholder="Example: Benfica, Porto, Sporting"
          value="{{club_query}}"
          required
        />
        <button type="submit">Search</button>
      </form>

      {{result_block}}

      <p class="footnote">
        Source: zerozero.pt. Results depend on the first club match returned by zerozero search.
      </p>
    </main>
    <script>
      const kitImage = document.querySelector(".image-wrap img");

      if (kitImage) {
        const sizeImage = () => {
          const containerWidth = Math.min(window.innerWidth - 120, 520);
          const naturalWidth = kitImage.naturalWidth || 0;
          const naturalHeight = kitImage.naturalHeight || 0;

          if (!naturalWidth || !naturalHeight) {
            return;
          }

          const width = Math.min(naturalWidth, containerWidth);
          const height = Math.min(naturalHeight, 680);

          kitImage.style.width = `${width}px`;
          kitImage.style.maxWidth = "100%";
          kitImage.style.height = "auto";
          kitImage.style.maxHeight = `${height}px`;
        };

        if (kitImage.complete) {
          sizeImage();
        } else {
          kitImage.addEventListener("load", sizeImage, { once: true });
        }

        window.addEventListener("resize", sizeImage);
      }
    </script>
  </body>
</html>
